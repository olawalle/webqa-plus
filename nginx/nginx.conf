# WebQA-Plus Nginx reverse proxy configuration
# Replace YOUR_DOMAIN with your actual domain (e.g. webqa.example.com)
# After SSL is provisioned, the HTTPS server block becomes active.

# ── HTTP: redirect to HTTPS + serve ACME challenges for Certbot ────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot / Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

