targets:
  - id: busha_staging
    url: https://staging.dash.busha.io/
    mode: stealth
    objectives: objectives.staging.busha.yaml
    benchmarks:
      min_coverage_pct: 50
      min_success_rate_pct: 50
      min_flows_completed: 1
    run:
      initial_max_steps: 110
      max_iterations: 5
      output_dir: ./reports
      tuning:
        path_discovery_boost: 1
        deep_traversal: true
        hidden_menu_expander: true
        form_validation_pass: true
        email_verification_enabled: false

  - id: aptlyflow_app
    url: https://app.aptlyflow.xyz
    mode: visual
    objectives: objectives.app.aptlyflow.yaml
    benchmarks:
      min_coverage_pct: 95
      min_success_rate_pct: 95
      min_flows_completed: 1
    run:
      initial_max_steps: 120
      max_iterations: 5
      output_dir: ./reports
      tuning:
        path_discovery_boost: 2
        deep_traversal: true
        hidden_menu_expander: true
        form_validation_pass: true
        email_verification_enabled: true
        email_provider: 1secmail
        email_provider_base_url: https://www.1secmail.com/api/v1/
        email_poll_timeout_seconds: 120
        email_poll_interval_seconds: 5
